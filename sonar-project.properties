sonar.projectKey=anhnq-hblab_react-clean-architect
sonar.organization=anhnq-hblab

# Project info
sonar.projectName=React Clean Architect
sonar.projectVersion=1.0

# Source
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
